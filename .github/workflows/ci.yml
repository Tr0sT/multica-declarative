name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true
      - run: go mod download
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go test ./...
      - run: go build -o ./bin/multica-declarative ./cmd/multica-declarative
      - run: ./bin/multica-declarative --version
      - run: ./bin/multica-declarative validate --config examples/basic/multica.yaml
