name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true
      - run: go mod download
      - name: Check formatting
        run: |
          gofmt -l . | tee gofmt-files.txt
          gofmt -d . > gofmt.diff
          test ! -s gofmt-files.txt
      - name: Upload formatting report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gofmt-report
          path: |
            gofmt-files.txt
            gofmt.diff
      - run: go vet ./...
      - run: go test ./...
      - run: go build -o ./bin/multica-declarative ./cmd/multica-declarative
      - run: ./bin/multica-declarative --version
      - run: ./bin/multica-declarative validate --config examples/basic/multica.yaml
